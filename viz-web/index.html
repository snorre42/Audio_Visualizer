<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Visualizer — by Snorre</title>
<meta name="description" content="Interactive audio visualizer by Snorre — drop a track or use your mic">
<meta name="author" content="Snorre">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  #viz-wrap {
    position: fixed; inset: 0;
    background: #000000;
  }
  #viz-3d, #viz-2d {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #viz-3d { z-index: 1; }
  #viz-2d { z-index: 2; opacity: 0; pointer-events: none; transition: opacity 200ms; }

  /* Slim bottom bar with main controls */
  #bottom-bar {
    position: fixed;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    display: flex; gap: 6px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    padding: 6px;
    opacity: 0.4;
    transition: opacity 250ms;
  }
  body:hover #bottom-bar { opacity: 1; }
  #bottom-bar button {
    background: transparent;
    color: #fff;
    border: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: background 150ms;
    white-space: nowrap;
  }
  #bottom-bar button:hover { background: rgba(255, 255, 255, 0.15); }
  #bottom-bar button.primary {
    background: rgba(168, 85, 247, 0.5);
    border-color: rgba(168, 85, 247, 0.7);
  }
  #bottom-bar button.primary:hover { background: rgba(168, 85, 247, 0.7); }
  #bottom-bar button.on {
    background: rgba(34, 197, 94, 0.4);
    border-color: rgba(34, 197, 94, 0.6);
  }

  /* Settings panel */
  #panel {
    position: fixed;
    top: 12px; right: 12px; bottom: 70px;
    width: 250px;
    background: rgba(10, 10, 14, 0.92);
    backdrop-filter: blur(12px);
    border: 0.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 14px;
    overflow-y: auto;
    transform: translateX(calc(100% + 24px));
    transition: transform 250ms;
    z-index: 25;
    font-size: 12px;
  }
  #panel.open { transform: translateX(0); }
  #panel h3 {
    margin: 14px 0 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.55;
    font-weight: 600;
  }
  #panel h3:first-child { margin-top: 0; }
  #panel .row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  #panel label { font-size: 11px; opacity: 0.75; min-width: 64px; }
  #panel select { flex: 1; min-width: 0; }
  #panel input[type="range"] { flex: 1; accent-color: #a855f7; }
  #panel select {
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    border: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 11px;
  }
  #panel input[type="color"] {
    width: 32px; height: 22px;
    border: 0.5px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    padding: 0;
  }
  .slider-val {
    font-size: 10px;
    opacity: 0.6;
    min-width: 24px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Top-left intro overlay */
  #intro {
    position: fixed;
    top: 12px; left: 12px;
    z-index: 28;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 11px;
    opacity: 0.85;
    max-width: 240px;
    transition: opacity 300ms;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro .title {
    font-weight: 600;
    margin-bottom: 4px;
    font-size: 12px;
  }
  #intro .desc { opacity: 0.7; line-height: 1.4; }

  /* Status indicators */
  #beat-pulse {
    position: fixed;
    bottom: 70px; left: 14px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    transition: background 80ms, transform 80ms;
    z-index: 20;
    opacity: 0.5;
  }
  #fps-tag {
    position: fixed;
    bottom: 70px; right: 14px;
    color: rgba(255, 255, 255, 0.35);
    font-size: 10px;
    z-index: 20;
    font-variant-numeric: tabular-nums;
    opacity: 0.5;
  }
  #credit {
    position: fixed;
    top: 14px; right: 18px;
    color: rgba(255, 255, 255, 0.5);
    font-size: 11px;
    z-index: 15;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.75;
    transition: opacity 250ms;
  }
  body:hover #credit { opacity: 1; }
  #credit .by { opacity: 0.55; margin-right: 5px; font-weight: 300; }
  #credit .name { color: #e0e0e0; font-weight: 400; }
  #vj-tag {
    position: fixed;
    top: 12px; left: 50%; transform: translateX(-50%);
    padding: 4px 12px;
    background: rgba(168, 85, 247, 0.85);
    color: #fff;
    font-size: 10px;
    border-radius: 999px;
    display: none;
    letter-spacing: 0.08em;
    z-index: 28;
    font-weight: 600;
  }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    #panel { right: 6px; left: 6px; width: auto; }
    #bottom-bar button { padding: 6px 10px; font-size: 11px; }
    #intro { max-width: calc(100vw - 24px); }
  }
</style>
</head>
<body>
  <div id="viz-wrap">
    <canvas id="viz-3d"></canvas>
    <canvas id="viz-2d"></canvas>
  </div>

  <div id="intro">
    <div class="title">Audio Visualizer</div>
    <div class="desc">Click a source below to start. Try Auto-VJ with your own track.</div>
  </div>

  <div id="vj-tag">AUTO-VJ</div>
  <div id="beat-pulse"></div>
  <div id="fps-tag">—</div>
  <div id="credit"><span class="by">by</span><span class="name">Snorre</span></div>

  <div id="bottom-bar">
    <button id="btn-mic" title="Microphone">🎤 Mic</button>
    <button id="btn-file" title="Upload audio file">📁 File</button>
    <button id="btn-demo" title="Demo tone">▶ Demo</button>
    <button id="btn-beat" title="Beat demo">⏱ Beat</button>
    <button id="btn-vj" class="primary" title="Toggle Auto-VJ">✨ Auto-VJ</button>
    <button id="btn-panel" title="Settings">⚙</button>
    <input type="file" id="file-input" accept="audio/*" style="display: none;" />
  </div>

  <div id="panel">
    <h3>Mode</h3>
    <div class="row">
      <label>Layers</label>
      <select id="layer-mode">
        <option value="auto" selected>3D only</option>
        <option value="both">Both layered</option>
        <option value="2d-only">2D only</option>
      </select>
    </div>
    <div class="row">
      <label>3D shape</label>
      <select id="shape3d">
        <option value="sphere" selected>Sphere (blob)</option>
        <option value="icosa">Icosahedron</option>
        <option value="torus">Torus knot</option>
        <option value="wire">Wireframe globe</option>
      </select>
    </div>
    <div class="row">
      <label>2D mode</label>
      <select id="mode2d">
        <option value="ribbon" selected>Ribbon</option>
        <option value="wave">Wave</option>
        <option value="orb">Orb</option>
        <option value="nebula">Nebula</option>
        <option value="particles">Particles</option>
        <option value="mountains">Mountains</option>
        <option value="tunnel">Tunnel</option>
      </select>
    </div>
    <div class="row">
      <label>Symmetry</label>
      <select id="symmetry">
        <option value="1" selected>None</option>
        <option value="2">Mirror</option>
        <option value="3">3-fold</option>
        <option value="4">4-fold</option>
        <option value="6">6-fold</option>
        <option value="8">8-fold</option>
      </select>
    </div>
    <div class="row">
      <label>Quality</label>
      <select id="quality">
        <option value="1">Standard</option>
        <option value="1.5" selected>High</option>
        <option value="2">Ultra</option>
      </select>
    </div>

    <h3>Colors</h3>
    <div class="row">
      <label>Preset</label>
      <select id="preset">
        <option value="silver" selected>Silver</option>
        <option value="aurora">Aurora</option>
        <option value="deep-sea">Deep sea</option>
        <option value="nebula">Nebula</option>
        <option value="lava">Lava lamp</option>
        <option value="ice">Ice</option>
        <option value="sunset">Sunset</option>
        <option value="midnight">Midnight</option>
        <option value="forest">Forest</option>
        <option value="custom">Custom</option>
      </select>
    </div>
    <div class="row">
      <label>Wave</label>
      <input type="color" id="col1" value="#f5f5f5">
      <input type="color" id="col2" value="#a0a0a0">
      <input type="color" id="col3" value="#404040">
    </div>
    <div class="row">
      <label>BG</label>
      <input type="color" id="bg-col" value="#000000">
    </div>

    <h3>Auto-VJ</h3>
    <div class="row">
      <label>VJ speed</label>
      <input type="range" id="vj-speed" min="10" max="300" value="100">
      <span id="vj-speed-val" class="slider-val">100</span>
    </div>

    <h3>Reactivity</h3>
    <div class="row">
      <label>Sensitivity</label>
      <input type="range" id="sens" min="10" max="300" value="120">
      <span id="sens-val" class="slider-val">120</span>
    </div>
    <div class="row">
      <label>Beat</label>
      <input type="range" id="beat" min="0" max="200" value="100">
      <span id="beat-val" class="slider-val">100</span>
    </div>
    <div class="row">
      <label>Distort</label>
      <input type="range" id="distort" min="0" max="200" value="100">
      <span id="distort-val" class="slider-val">100</span>
    </div>
    <div class="row">
      <label>Spin</label>
      <input type="range" id="speed" min="0" max="300" value="100">
      <span id="speed-val" class="slider-val">100</span>
    </div>
    <div class="row">
      <label>Smooth</label>
      <input type="range" id="smooth" min="0" max="100" value="82">
      <span id="smooth-val" class="slider-val">82</span>
    </div>

    <h3>2D Effects</h3>
    <div class="row">
      <label>Opacity</label>
      <input type="range" id="opacity2d" min="0" max="100" value="80">
      <span id="opacity2d-val" class="slider-val">80</span>
    </div>
    <div class="row">
      <label>Glow</label>
      <input type="range" id="glow" min="0" max="60" value="28">
      <span id="glow-val" class="slider-val">28</span>
    </div>
    <div class="row">
      <label>Trails</label>
      <input type="range" id="trail" min="0" max="98" value="86">
      <span id="trail-val" class="slider-val">86</span>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script src="visualizer.js"></script>
</body>
</html>
